<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Claude Usage Widget</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Claude 사용량 위젯</h1>

    <!-- 로그인 상태 -->
    <div class="status-bar">
      <span><span class="dot gray" id="loginDot"></span><span id="loginText">확인 중...</span></span>
      <button class="btn-small btn-primary" id="loginBtn" style="display:none">로그인</button>
      <button class="btn-small btn-danger" id="logoutBtn" style="display:none">로그아웃</button>
    </div>

    <!-- 사용량 카드 (Claude) -->
    <div id="usageCards"></div>

    <!-- API 요금 카드 -->
    <div id="costCards" style="display:none">
      <div class="usage-card" style="padding:12px 16px">
        <div class="label">💰 API 요금 <span class="source-badge" id="costSourceBadge"></span></div>
        <div style="display:flex;gap:16px;margin:8px 0">
          <div>
            <div style="font-size:11px;color:var(--text-sub)">오늘</div>
            <div id="costToday" style="font-size:20px;font-weight:700;color:var(--accent)">--</div>
            <div id="costTodayKrw" style="font-size:11px;color:var(--text-dim)"></div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text-sub)">이번 달</div>
            <div id="costMonth" style="font-size:20px;font-weight:700;color:var(--accent2)">--</div>
            <div id="costMonthKrw" style="font-size:11px;color:var(--text-dim)"></div>
          </div>
        </div>
        <div id="costByAI"></div>
        <!-- 구독 표시 -->
        <div id="costSubs" style="display:none"></div>
      </div>
    </div>

    <!-- 오랑붕쌤 연결 -->
    <div class="status-bar" style="margin-bottom:8px">
      <span><span class="dot gray" id="obsDot"></span><span id="obsText">오랑붕쌤: 확인 중</span></span>
      <button class="btn-small btn-secondary" id="obsBtn" style="background:#10a37f;color:#fff">연결</button>
    </div>

    <!-- Admin API 키 (Billing) -->
    <div style="margin-bottom:12px">
      <label style="font-size:11px;color:var(--text-sub);display:block;margin-bottom:4px">Billing API 키 (실제 청구 비용)</label>
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
        <span style="font-size:11px;color:#c96442;min-width:50px">Claude</span>
        <input type="password" id="anthropicKeyInput" placeholder="sk-ant-admin-..." style="flex:1;background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:11px">
        <button class="btn-small btn-secondary" id="anthropicKeySave">저장</button>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:11px;color:#10a37f;min-width:50px">GPT</span>
        <input type="password" id="openaiKeyInput" placeholder="sk-admin-..." style="flex:1;background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:11px">
        <button class="btn-small btn-secondary" id="openaiKeySave">저장</button>
      </div>
      <button class="btn-small btn-secondary" id="adminKeyRestore" style="margin-top:6px;width:100%">☁️ Drive에서 키 불러오기</button>
      <div id="adminCostText" style="font-size:11px;color:var(--text-dim);margin-top:6px;white-space:pre-line"></div>
    </div>

    <!-- 설정 -->
    <div class="settings">
      <!-- 표시 모드 -->
      <label>표시 모드</label>
      <div class="mode-selector" style="margin-bottom:12px">
        <label class="mode-option">
          <input type="radio" name="displayMode" value="CLAUDE_ONLY" checked>
          <span>Claude 단독</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="displayMode" value="API_COST_ONLY">
          <span>API 요금만</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="displayMode" value="BOTH">
          <span>둘 다</span>
        </label>
      </div>

      <label>새로고침 주기 (초)</label>
      <div style="display:flex;align-items:center">
        <input type="number" id="intervalInput" min="30" value="120">
        <button class="btn-small btn-secondary" id="saveBtn">저장</button>
      </div>

      <!-- 스킨 선택 -->
      <div class="skin-section">
        <div class="skin-sub-label">오버레이 스킨</div>
        <div class="skin-grid" id="overlaySkinGrid"></div>

        <div class="skin-sub-label" style="margin-top:12px">앱 배경 스킨</div>
        <div class="skin-grid" id="skinGrid"></div>

        <!-- 오버레이 글씨 색 -->
        <div class="skin-sub-label" style="margin-top:12px">오버레이 글씨 색</div>
        <div class="text-color-row">
          <div class="text-color-preview" id="textColorPreview"></div>
          <input type="color" id="textColorPicker" value="#e0e0e0">
          <input type="text" id="textColorHex" placeholder="#FFFFFF">
          <button class="btn-small btn-primary" id="textColorApply">적용</button>
          <button class="btn-small btn-secondary" id="textColorReset">초기화</button>
        </div>
        <div class="text-color-presets" id="textColorPresets"></div>
      </div>
    </div>

    <!-- 버튼 -->
    <div class="btn-row">
      <button class="btn-primary" id="refreshBtn">새로고침</button>
      <button class="btn-secondary" id="widgetBtn">위젯 표시</button>
      <select id="overlayModeSelect" style="padding:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:12px">
        <option value="MINIMAL">최소 (세션 %)</option>
        <option value="BASIC">기본 (세션 + 주간)</option>
        <option value="COST">비용 (세션 + 요금)</option>
        <option value="FULL">전체 (세션 + 주간 + 요금)</option>
      </select>
    </div>

    <div class="status-text" id="statusText">시작 중...</div>
  </div>

  <!-- 숨겨진 파일 인풋 (커스텀 스킨 사진 업로드) -->
  <input type="file" id="skinFileInput" accept="image/*" style="display:none">

  <script src="index.js"></script>
</body>
</html>
